<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="{{ '/favicon.ico' | relative_url }}" sizes="any">
<title>{{ page.title | default: site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<meta property="og:title" content="{{ page.og_title | default: page.title | default: site.title }}">
<meta property="og:description" content="{{ page.og_description | default: page.description | default: site.description }}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ page.url | absolute_url }}">
{% if page.social_image or site.social_image %}
<meta property="og:image" content="{{ page.social_image | default: site.social_image | absolute_url }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.twitter_title | default: page.og_title | default: page.title | default: site.title }}">
<meta name="twitter:description" content="{{ page.twitter_description | default: page.og_description | default: page.description | default: site.description }}">
<meta name="twitter:image" content="{{ page.social_image | default: site.social_image | absolute_url }}">
{% else %}
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{{ page.twitter_title | default: page.og_title | default: page.title | default: site.title }}">
<meta name="twitter:description" content="{{ page.twitter_description | default: site.description }}">
{% endif %}
{% seo %}
<style>
  :root {
    color-scheme: light;
    --paper: #f3f0e9;
    --paper-warm: #faf7ef;
    --fog: #d7d8d4;
    --rain: #b8bfbd;
    --sound: #7f9298;
    --ink: #242729;
    --ink-soft: rgba(36, 39, 41, 0.68);
    --ink-faint: rgba(36, 39, 41, 0.46);
    --rule: rgba(36, 39, 41, 0.16);
    --warm-rule: rgba(122, 93, 69, 0.16);
    --shadow: 0 24px 80px rgba(36, 39, 41, 0.14);
  }

  *, *::before, *::after {
    box-sizing: border-box;
  }

  html {
    min-height: 100%;
    background: var(--fog);
  }

  body {
    margin: 0;
    min-height: 100vh;
    color: var(--ink);
    font-family: "Optima", "Avenir Next", Avenir, "Helvetica Neue", Helvetica, Arial, sans-serif;
    background:
      linear-gradient(180deg, rgba(250, 247, 239, 0.78), rgba(215, 216, 212, 0.82)),
      radial-gradient(circle at 22% 16%, rgba(255, 252, 244, 0.9), transparent 21rem),
      radial-gradient(circle at 78% 8%, rgba(127, 146, 152, 0.28), transparent 25rem),
      linear-gradient(135deg, #dad9d3, #c9cfcc 52%, #adb9b8);
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(90deg, transparent 0 calc(50% - 1px), rgba(36, 39, 41, 0.05) calc(50% - 1px) calc(50% + 1px), transparent calc(50% + 1px)),
      repeating-linear-gradient(0deg, rgba(36, 39, 41, 0.026) 0 1px, transparent 1px 28px);
    opacity: 0.9;
  }

  main {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    width: min(980px, 100%);
    margin: 0 auto;
    padding: clamp(22px, 6vw, 72px);
    display: grid;
    place-items: center;
  }

  .identity-card {
    width: 100%;
    display: grid;
    grid-template-columns: minmax(0, 1fr);
    gap: 0;
    background: rgba(250, 247, 239, 0.84);
    border: 1px solid var(--rule);
    border-radius: 2px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .identity-photo {
    position: relative;
    margin: 0;
    padding: clamp(16px, 3.4vw, 24px);
    border-bottom: 1px solid var(--rule);
    background: rgba(243, 240, 233, 0.66);
    outline: none;
    user-select: none;
    -webkit-user-select: none;
  }

  .identity-photo img {
    display: block;
    width: 100%;
    max-height: 520px;
    aspect-ratio: 4 / 5;
    object-fit: cover;
    border: 1px solid var(--warm-rule);
    filter: saturate(1.06) contrast(0.99) brightness(1.02);
    user-select: none;
    -webkit-user-drag: none;
  }

  .image-shield {
    position: absolute;
    inset: clamp(16px, 3.4vw, 24px);
    z-index: 1;
    border: 1px solid transparent;
    background: rgba(255, 255, 255, 0.001);
  }

  .identity-photo figcaption {
    position: absolute;
    z-index: 2;
    left: clamp(26px, 4.8vw, 38px);
    right: clamp(26px, 4.8vw, 38px);
    bottom: clamp(26px, 4.8vw, 38px);
    padding: 10px 12px;
    background: rgba(250, 247, 239, 0.92);
    border: 1px solid rgba(36, 39, 41, 0.16);
    color: rgba(36, 39, 41, 0.74);
    font-family: "Avenir Next", Avenir, "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    line-height: 1.25;
    box-shadow: 0 12px 34px rgba(36, 39, 41, 0.14);
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.16s ease, transform 0.16s ease;
  }

  .identity-photo:hover figcaption,
  .identity-photo:hover figcaption {
    opacity: 1;
    transform: translateY(0);
  }

  .identity-copy {
    position: relative;
    padding: clamp(28px, 4.8vw, 52px);
    display: grid;
    align-content: center;
  }

  .year-mark {
    position: absolute;
    top: clamp(18px, 3vw, 28px);
    right: clamp(22px, 4vw, 36px);
    margin: 0;
    color: rgba(36, 39, 41, 0.34);
    font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.14em;
  }

  h1 {
    margin: 0;
    max-width: 13ch;
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    font-size: clamp(38px, 6.2vw, 64px);
    font-weight: 500;
    letter-spacing: -0.03em;
    line-height: 0.98;
  }

  .role-line {
    margin: 18px 0 0;
    color: rgba(36, 39, 41, 0.74);
    max-width: 38ch;
    font-family: "Avenir Next", Avenir, "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: clamp(16px, 1.85vw, 19px);
    font-weight: 520;
    letter-spacing: 0;
    line-height: 1.42;
  }

  a {
    color: inherit;
    text-decoration-color: rgba(36, 39, 41, 0.28);
    text-decoration-thickness: 1px;
    text-underline-offset: 3px;
    transition: color 0.16s ease, text-decoration-color 0.16s ease;
  }

  a:hover,
  a:focus-visible {
    color: var(--ink);
    text-decoration-color: currentColor;
  }

  .role-link {
    position: relative;
    display: inline-block;
    color: var(--ink);
    font-weight: 680;
  }

  .tooltip {
    position: absolute;
    left: 0;
    top: calc(100% + 8px);
    width: max-content;
    max-width: 210px;
    padding: 7px 9px;
    background: rgba(36, 39, 41, 0.94);
    color: var(--paper-warm);
    font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    font-size: 0.68rem;
    font-weight: 650;
    letter-spacing: 0.04em;
    line-height: 1.25;
    text-transform: uppercase;
    opacity: 0;
    pointer-events: none;
    transform: translateY(-4px);
    transition: opacity 0.16s ease, transform 0.16s ease;
  }

  .tooltip-link:hover .tooltip,
  .tooltip-link:focus-visible .tooltip {
    opacity: 1;
    transform: translateY(0);
  }

  .dad-joke {
    cursor: help;
    outline: none;
  }

  .dad-joke .tooltip {
    right: 0;
    left: auto;
    max-width: 260px;
    text-transform: none;
    letter-spacing: 0.02em;
  }

  .dad-joke:hover .tooltip,
  .dad-joke:focus-visible .tooltip {
    opacity: 1;
    transform: translateY(0);
  }

  .role-link:last-of-type .tooltip {
    right: 0;
    left: auto;
  }

  .identity-facts {
    margin: clamp(28px, 5vw, 50px) 0 0;
    display: grid;
    gap: 10px;
    color: rgba(36, 39, 41, 0.7);
    font-family: "Avenir Next", Avenir, "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: clamp(15px, 1.8vw, 17px);
    line-height: 1.45;
    border-top: 1px solid var(--rule);
    padding-top: 20px;
  }

  .identity-facts p {
    margin: 0;
    min-width: 0;
    overflow-wrap: break-word;
  }

  .identity-facts a {
    font-weight: 520;
  }

  .email-line {
    max-width: 100%;
  }

  .email-line a {
    white-space: normal;
  }

  .location-field {
    position: relative;
    overflow: visible;
    width: max-content;
    max-width: 100%;
  }

  .location-trigger {
    cursor: help;
    border-bottom: 1px dotted rgba(36, 39, 41, 0.34);
    outline: none;
  }

  .location-trigger:focus-visible {
    border-bottom-color: var(--ink);
  }

  .map-popover {
    position: absolute;
    z-index: 5;
    left: 0;
    bottom: calc(100% + 10px);
    width: min(320px, 78vw);
    padding: 10px;
    background: rgba(250, 247, 239, 0.96);
    border: 1px solid var(--rule);
    box-shadow: 0 18px 50px rgba(36, 39, 41, 0.16);
    opacity: 0;
    pointer-events: none;
    transform: translateY(6px);
    transition: opacity 0.16s ease, transform 0.16s ease;
  }

  .location-field:hover .map-popover,
  .location-field:focus-within .map-popover {
    opacity: 1;
    transform: translateY(0);
  }

  .map-popover iframe {
    display: block;
    width: 100%;
    height: 190px;
    border: 1px solid rgba(36, 39, 41, 0.12);
    filter: saturate(0.82) contrast(0.94);
  }

  .map-caption {
    display: block;
    margin-top: 8px;
    color: var(--ink-soft);
    font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    font-size: 0.67rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    line-height: 1.35;
    text-transform: uppercase;
  }

  .resume-card {
    width: min(760px, 100%);
    padding: clamp(28px, 6vw, 58px);
    background: rgba(250, 247, 239, 0.86);
    border: 1px solid var(--rule);
    box-shadow: var(--shadow);
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    width: max-content;
    margin-bottom: clamp(28px, 5vw, 46px);
    padding: 7px 10px;
    border: 1px solid rgba(36, 39, 41, 0.16);
    background: rgba(250, 247, 239, 0.56);
    color: rgba(36, 39, 41, 0.56);
    font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .back-link::before {
    content: "←";
    margin-right: 8px;
    font-size: 0.9rem;
  }

  .resume-head {
    display: grid;
    gap: 0;
  }

  .resume-kicker {
    margin: 0 0 12px;
    color: rgba(36, 39, 41, 0.46);
    font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .resume-card h1 {
    max-width: none;
    font-size: clamp(42px, 8vw, 78px);
  }

  .resume-intro {
    margin: 18px 0 0;
    max-width: 52ch;
    color: rgba(36, 39, 41, 0.72);
    font-family: "Avenir Next", Avenir, "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: clamp(17px, 2.2vw, 20px);
    line-height: 1.5;
  }

  .resume-contact {
    margin: 18px 0 0;
    color: rgba(36, 39, 41, 0.72);
    font-family: "Avenir Next", Avenir, "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 1rem;
    line-height: 1.45;
    overflow-wrap: anywhere;
  }

  .resume-sections {
    display: grid;
    gap: 24px;
    margin-top: clamp(34px, 6vw, 54px);
    border-top: 1px solid var(--rule);
    padding-top: 24px;
  }

  .resume-sections section {
    display: grid;
    grid-template-columns: minmax(120px, 0.34fr) minmax(0, 1fr);
    gap: clamp(16px, 4vw, 30px);
  }

  .resume-sections h2 {
    margin: 0;
    color: rgba(36, 39, 41, 0.5);
    font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .resume-sections p {
    margin: 0;
    color: rgba(36, 39, 41, 0.76);
    font-family: "Avenir Next", Avenir, "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 1rem;
    line-height: 1.55;
  }

  @media (min-width: 780px) {
    .identity-card {
      grid-template-columns: minmax(260px, 340px) minmax(0, 1fr);
      min-height: 520px;
    }

    .identity-photo {
      border-right: 1px solid var(--rule);
      border-bottom: 0;
    }

    .identity-photo img {
      height: 100%;
    }
  }

  @media (min-width: 980px) {
    .identity-card {
      grid-template-columns: 330px minmax(0, 1fr);
    }
  }

  @media (max-width: 620px) {
    main {
      place-items: start center;
      padding: 18px;
    }

    .year-mark {
      position: static;
      margin: 0 0 18px;
    }

    .identity-copy {
      padding: 24px;
    }

    .role-line {
      max-width: none;
    }

    .dad-joke .tooltip {
      right: auto;
      left: 0;
    }

    .map-popover {
      width: min(260px, 82vw);
    }

    .resume-sections section {
      grid-template-columns: 1fr;
      gap: 7px;
    }
  }
</style>
</head>
<body class="{{ page.body_class | default: '' }}">
<main>
  {{ content }}
</main>
<script>
  document.querySelectorAll(".identity-photo img").forEach((image) => {
    image.addEventListener("dragstart", (event) => event.preventDefault());
    image.addEventListener("contextmenu", (event) => event.preventDefault());
  });
</script>
</body>
</html>
